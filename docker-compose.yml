version: "3.9"

services:
  git-mcp-bridge:
    build: .
    container_name: git-mcp-bridge
    env_file:
      - .env
    ports:
      - "9090:9090"
    environment:
      - PORT=9090
      - GITHUB_HOST=${GITHUB_HOST:-}
      - GITHUB_API_URL=${GITHUB_API_URL:-}
      - MCP_READ_ONLY=${MCP_READ_ONLY:-false}
      - MCP_SCOPE_CHALLENGE=${MCP_SCOPE_CHALLENGE:-false}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/.well-known/oauth-protected-resource"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s